<section class="timeline-page">
  <header class="page-header">
    <p class="eyebrow">Investigation</p>
    <h1>Timeline</h1>
    <p class="description">
      Review the sequence of events and identify the most suspicious moments.
    </p>
  </header>

  <div class="timeline-list">
    @for (event of timeline; track event.id) {
      <article class="timeline-item">
        <p class="time">{{ event.time }}</p>
        <h2>{{ event.title }}</h2>
        <p class="summary">{{ event.summary }}</p>
      </article>
    }
  </div>

  <a class="back-link" routerLink="/evidence">← Back to Evidence</a>
</section>
